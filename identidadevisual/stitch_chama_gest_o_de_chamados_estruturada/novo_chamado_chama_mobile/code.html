<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Novo Chamado - Chama</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<!-- Tailwind Config Injection -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#ffb5a0",
                        "tertiary-fixed-dim": "#e9c400",
                        "on-primary-fixed": "#3b0900",
                        "surface-container-high": "#e2e7ff",
                        "secondary-container": "#fd8b00",
                        "primary-container": "#d83900",
                        "primary": "#ad2c00",
                        "on-background": "#131b2e",
                        "surface": "#faf8ff",
                        "primary-fixed": "#ffdbd1",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-primary-fixed-variant": "#872000",
                        "surface-tint": "#b12d00",
                        "error": "#ba1a1a",
                        "on-surface": "#131b2e",
                        "surface-variant": "#dae2fd",
                        "tertiary-container": "#c9a900",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#ffb77d",
                        "on-primary": "#ffffff",
                        "secondary": "#904d00",
                        "surface-container": "#eaedff",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "tertiary-fixed": "#ffe16d",
                        "on-tertiary-container": "#4c3f00",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-bright": "#faf8ff",
                        "on-surface-variant": "#5d4038",
                        "on-secondary-fixed": "#2f1500",
                        "surface-container-lowest": "#ffffff",
                        "background": "#faf8ff",
                        "on-secondary-fixed-variant": "#6e3900",
                        "outline": "#926f66",
                        "secondary-fixed": "#ffdcc3",
                        "inverse-on-surface": "#eef0ff",
                        "surface-container-highest": "#dae2fd",
                        "inverse-primary": "#ffb5a0",
                        "surface-container-low": "#f2f3ff",
                        "on-secondary-container": "#603100",
                        "tertiary": "#705d00",
                        "on-tertiary-fixed": "#221b00",
                        "surface-dim": "#d2d9f4",
                        "outline-variant": "#e7bdb2",
                        "inverse-surface": "#283044"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "stack-md": "16px",
                        "container-max": "1440px",
                        "stack-lg": "24px",
                        "sidebar-width": "280px",
                        "margin-mobile": "16px",
                        "stack-sm": "8px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter", "sans-serif"],
                        "headline-md": ["Inter", "sans-serif"],
                        "headline-lg-mobile": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "metadata": ["Inter", "sans-serif"],
                        "headline-sm": ["Inter", "sans-serif"],
                        "display-lg": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "metadata": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased h-screen flex flex-col md:hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Header: Suppresses global navs per instructions -->
<header class="flex items-center gap-stack-md px-margin-mobile py-stack-md bg-surface border-b border-outline-variant/30 sticky top-0 z-10 shadow-sm">
<button class="flex items-center justify-center p-2 -ml-2 rounded-full text-on-surface hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">Novo Chamado</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-stack-lg flex flex-col gap-stack-lg pb-[100px]">
<!-- Form Section -->
<form class="flex flex-col gap-stack-lg" id="new-task-form">
<!-- Title Field -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="task-title">Título do Chamado</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-3 font-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="task-title" placeholder="Ex: Atualização de servidor pendente" required="" type="text"/>
</div>
<!-- Department Dropdown -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="task-department">Departamento Destino</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline-variant rounded-lg p-3 pr-10 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="task-department" required="">
<option disabled="" selected="" value="">Selecione um departamento</option>
<option value="ti">TI &amp; Infraestrutura</option>
<option value="rh">Recursos Humanos</option>
<option value="ops">Operações</option>
<option value="fin">Financeiro</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Priority Selection (Segmented Control) -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Prioridade</label>
<div class="flex bg-surface-container-low p-1 rounded-lg border border-outline-variant/50 shadow-inner">
<!-- Low -->
<label class="flex-1 relative cursor-pointer group">
<input class="peer sr-only" name="priority" type="radio" value="low"/>
<div class="text-center py-2 rounded-md font-metadata text-metadata text-on-surface-variant transition-all duration-200 peer-checked:bg-surface-container-lowest peer-checked:text-primary peer-checked:shadow-sm peer-checked:font-bold hover:text-on-surface">
                            Baixa
                        </div>
</label>
<!-- Medium -->
<label class="flex-1 relative cursor-pointer group">
<input checked="" class="peer sr-only" name="priority" type="radio" value="medium"/>
<div class="text-center py-2 rounded-md font-metadata text-metadata text-on-surface-variant transition-all duration-200 peer-checked:bg-surface-container-lowest peer-checked:text-primary peer-checked:shadow-sm peer-checked:font-bold hover:text-on-surface">
                            Média
                        </div>
</label>
<!-- High -->
<label class="flex-1 relative cursor-pointer group">
<input class="peer sr-only" name="priority" type="radio" value="high"/>
<div class="text-center py-2 rounded-md font-metadata text-metadata text-on-surface-variant transition-all duration-200 peer-checked:bg-surface-container-lowest peer-checked:text-primary peer-checked:shadow-sm peer-checked:font-bold hover:text-on-surface flex items-center justify-center gap-1">
                            Alta
                        </div>
</label>
</div>
</div>
<!-- Description Field -->
<div class="flex flex-col gap-stack-sm flex-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="task-description">Descrição Detalhada</label>
<textarea class="w-full flex-1 min-h-[120px] bg-surface-container-lowest border border-outline-variant rounded-lg p-3 font-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm resize-none" id="task-description" placeholder="Descreva o problema ou solicitação com o máximo de detalhes possível..." required="" rows="5"></textarea>
</div>
</form>
</main>
<!-- Bottom Action Bar (Sticky Footer) -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant/30 p-margin-mobile pb-[env(safe-area-inset-bottom,16px)] shadow-[0_-4px_6px_-1px_rgba(15,23,42,0.05)]">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-on-primary rounded-lg py-3 px-6 font-headline-sm text-headline-sm hover:bg-primary/90 active:scale-[0.98] transition-all duration-200 shadow-sm" form="new-task-form" type="submit">
<span class="material-symbols-outlined" data-icon="add_task">add_task</span>
            Criar Chamado
        </button>
</div>
<!-- Micro-interaction Script -->
<script>
        document.getElementById('new-task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            // Simulating loading state
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Processando...`;
            btn.classList.add('opacity-80', 'pointer-events-none');
            
            setTimeout(() => {
                // Success state
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                btn.classList.replace('text-on-primary', 'text-on-tertiary-container');
                btn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Criado!`;
                
                // Reset after delay (simulate closing modal/navigating back)
                setTimeout(() => {
                    btn.classList.replace('bg-tertiary-container', 'bg-primary');
                    btn.classList.replace('text-on-tertiary-container', 'text-on-primary');
                    btn.innerHTML = originalText;
                    btn.classList.remove('opacity-80', 'pointer-events-none');
                    e.target.reset();
                }, 1500);
            }, 1000);
        });
    </script>
</body></html>
