                    </p>

<form action="#" class="mt-8 space-y-6" method="POST">
<div class="space-y-stack-md">
<!-- Email Input -->
<div>
<label class="block font-metadata text-metadata text-on-surface mb-stack-sm" for="email">
                                Email
                            </label>
<div class="mt-1">
<input autocomplete="email" class="appearance-none block w-full px-4 py-3 border border-[#E2E8F0] rounded-lg shadow-sm placeholder-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary font-body-md text-body-md bg-white transition-colors duration-200" id="email" name="email" placeholder="seu.email@exemplo.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block font-metadata text-metadata text-on-surface mb-stack-sm" for="password">
                                Senha
                            </label>
<div class="mt-1 relative">
<input autocomplete="current-password" class="appearance-none block w-full px-4 py-3 border border-[#E2E8F0] rounded-lg shadow-sm placeholder-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary font-body-md text-body-md bg-white transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-primary focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
</div>

                            </label>
</div>
<div class="text-sm">
<a class="font-metadata text-metadata text-primary hover:text-primary-container font-medium transition-colors" href="#">
                                Esqueceu a senha?
                            </a>
</div>
</div>

<div>

                        </button>
