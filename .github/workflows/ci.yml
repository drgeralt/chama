name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: chama
          POSTGRES_PASSWORD: chamapassword
          POSTGRES_DB: chamadb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Pytest
      env:
        DATABASE_URL: postgres://chama:chamapassword@localhost:5432/chamadb
        SECRET_KEY: test-secret-key
        DEBUG: True
      run: |
        pytest apps/ -v

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Unit Tests (Vitest)
      run: npm run test.unit -- --run
      
    - name: Cypress run (E2E)
      uses: cypress-io/github-action@v6
      with:
        working-directory: frontend
        build: npm run build
        start: npm run preview
        wait-on: 'http://localhost:4173'
