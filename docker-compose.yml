services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 512M
  web:
    deploy:
      resources:
        limits:
          memory: 4G
    build:
      context: .
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    command: sh -c "daphne -b 0.0.0.0 -p 8000 config.asgi:application & tail -f /dev/null"
    volumes:
      - .:/app:z
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    user: "${UID:-1000}:${GID:-1000}"

volumes:
  postgres_data:
